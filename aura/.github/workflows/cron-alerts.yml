name: Cron — Check Alert Rules

on:
  schedule:
    # Every hour during business hours (UTC 6:00–18:00)
    - cron: "0 6-18 * * 1-5"
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check alerts via API
        run: |
          # This calls the alert check endpoint for each org.
          # In production, you would iterate over all active orgs.
          # For now, the endpoint is designed to be called by org.
          curl -X POST "${{ secrets.APP_URL }}/api/alerts/check-and-fire" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"org_id": "${{ secrets.DEFAULT_ORG_ID }}", "branch_id": null}' \
            --fail --silent --show-error
